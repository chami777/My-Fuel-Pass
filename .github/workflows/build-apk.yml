name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK from HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Prepare Web Folder
        run: |
          mkdir www
          cp *.html www/ 

      - name: Install Capacitor & Setup Live Update
        run: |
          npm init -y
          # මෙහිදී @capacitor/assets අලුතින් එක් කර ඇත
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets
          npx cap init "My Fuel Pass" "com.myfuelpass.app" --web-dir www
          
          REPO_NAME=$(basename ${{ github.repository }})
          OWNER_NAME=${{ github.repository_owner }}
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.myfuelpass.app",
            "appName": "My Fuel Pass",
            "webDir": "www",
            "server": {
              "url": "https://${OWNER_NAME}.github.io/${REPO_NAME}/",
              "cleartext": true
            }
          }
          EOF
          npx cap add android

      - name: Generate App Icon
        run: |
          # icon.png පින්තූරය ඇත්නම් එයින් App Icon සෑදීම
          mkdir -p assets
          if [ -f "icon.png" ]; then
            cp icon.png assets/icon.png
            npx capacitor-assets generate --android
          else
            echo "icon.png එක සොයාගත නොහැක. Default Icon එක භාවිතා වේ."
          fi

      - name: Fix Kotlin Duplicate Classes
        run: |
          cat <<EOF >> android/build.gradle
          subprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.8.22'
                      }
                  }
              }
          }
          EOF

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: My-Fuel-Pass-APK-Live
          path: android/app/build/outputs/apk/debug/app-debug.apk
