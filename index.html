<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Fuel Pass - Premium</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --accent: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            
            /* Light Mode Liquid Glass Variables */
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --text-main: #1e293b;
            --text-muted: #475569;
            --modal-bg: rgba(255, 255, 255, 0.85);
            --input-bg: rgba(255, 255, 255, 0.6);
        }

        [data-theme="dark"] {
            /* Dark Mode Liquid Glass Variables */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(15, 23, 42, 0.55);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --modal-bg: rgba(15, 23, 42, 0.9);
            --input-bg: rgba(30, 41, 59, 0.6);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.4s ease, color 0.4s ease, border 0.4s ease;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* Glassmorphism Utility */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 24px 16px;
            padding-bottom: 100px;
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo-area h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #4f46e5, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .theme-btn {
            width: 45px; height: 45px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.2rem;
            color: var(--text-main);
        }

        /* Hero Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .hero-card {
            grid-column: span 2;
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-card h1 { font-size: 2.5rem; margin: 8px 0; font-weight: 800; color: var(--text-main); }
        .hero-card p { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); }

        .mini-card {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .mini-card h3 { font-size: 1.2rem; margin-top: 4px; color: var(--text-main); }
        .mini-card span { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; }

        /* Vehicle Section */
        .section-title {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; padding: 0 4px;
        }
        .section-title h4 { font-weight: 700; color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem; }

        .vehicle-card {
            padding: 20px;
            margin-bottom: 16px;
            animation: slideIn 0.5s ease-out;
            position: relative;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .v-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .v-title h3 { font-size: 1.2rem; font-weight: 700; }
        .v-title p { font-size: 0.9rem; color: var(--primary-light); font-family: monospace; font-weight: bold; margin-top: 2px; }

        .v-qr-thumb {
            width: 60px; height: 60px; border-radius: 12px;
            border: 2px solid var(--glass-border); padding: 2px; background: rgba(255,255,255,0.8);
            cursor: pointer; object-fit: cover; transition: transform 0.2s;
        }
        .v-qr-thumb:hover { transform: scale(1.05); }

        .v-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700;
        }
        .badge-allow { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-deny { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .v-details {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin: 15px 0; padding: 12px; background: rgba(0,0,0,0.05); border-radius: 12px;
        }
        [data-theme="dark"] .v-details { background: rgba(255,255,255,0.05); }
        .detail-item { font-size: 0.8rem; display: flex; flex-direction: column; }
        .detail-item b { color: var(--text-main); font-size: 0.9rem; margin-top: 2px; }

        .btn-log {
            width: 100%; padding: 14px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }
        .btn-log:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.5; box-shadow: none; }

        /* FAB */
        .fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none;
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
            cursor: pointer; z-index: 100;
        }

        /* Modals (Liquid Glass) */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content {
            background: var(--modal-bg); width: 100%; max-width: 400px;
            padding: 30px; border-radius: 28px; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); max-height: 90vh; overflow-y: auto;
        }

        /* Inputs Fix for Dark Mode */
        input, select {
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid var(--glass-border); margin-top: 6px; 
            background: var(--input-bg); color: var(--text-main);
            font-size: 0.95rem; font-weight: 500;
            backdrop-filter: blur(5px);
        }
        input::placeholder { color: var(--text-muted); opacity: 0.7; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2); }
        option { background: var(--modal-bg); color: var(--text-main); } /* Fix dropdown options visibility */

        label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; margin-top: 15px; }

        .qr-full-img { width: 100%; border-radius: 16px; margin: 15px 0; border: 2px solid var(--glass-border); }
        
        /* Auto Calc Inputs */
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .calc-grid input { font-size: 1.2rem; font-weight: bold; text-align: center; color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="logo-area">
            <h2 style="font-size: 1.5rem;">My Fuel Pass</h2>
        </div>
        <button class="theme-btn liquid-glass" onclick="toggleTheme()" id="themeBtn">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="stats-grid">
        <div class="hero-card liquid-glass" id="statusCard">
            <p id="dateDisplay"></p>
            <h1 id="todayTypeDisplay">--</h1>
            <p id="todayDigitInfo"></p>
        </div>
        
        <div class="mini-card liquid-glass">
            <span>TOTAL LITERS</span>
            <h3 id="totalLitersDisplay">0 L</h3>
        </div>
        
        <div class="mini-card liquid-glass">
            <span>WEEKLY COST</span>
            <h3 id="totalCostDisplay">Rs. 0</h3>
        </div>
    </div>

    <div class="section-title">
        <h4>Your Vehicles</h4>
        <button onclick="resetExpenses()" style="background:none; border:none; color:var(--danger); font-size:0.75rem; font-weight:700; cursor:pointer;">
            <i class="fas fa-sync-alt"></i> RESET HISTORY
        </button>
    </div>

    <div id="vehicleList">
        </div>

    <button class="fab" onclick="openAddModal()">
        <i class="fas fa-plus"></i>
    </button>
</div>

<div class="modal" id="addModal">
    <div class="modal-content liquid-glass">
        <h3 style="margin-bottom: 5px; text-align: center;">Add New Vehicle</h3>
        <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">Enter vehicle details below</p>
        
        <form id="vehicleForm">
            <label>Vehicle Name</label>
            <input type="text" id="vName" placeholder="e.g. My Bike" required>
            
            <label>Vehicle Number</label>
            <input type="text" id="vNumber" placeholder="ABC-1234" required>
            
            <label>Vehicle Type</label>
            <select id="vType" required>
                <option value="" disabled selected>Select Type</option>
                <option value="25">Motor Cars (25L)</option>
                <option value="20">Three-Wheelers (20L)</option>
                <option value="8">Motorcycles (8L)</option>
                <option value="50">Vans (50L)</option>
                <option value="100">Buses (100L)</option>
                <option value="200">Lorries (200L)</option>
                <option value="40">Land/Special Vehicles (40L)</option>
                <option value="8">Quadricycle (8L)</option>
            </select>

            <label>Fuel Type</label>
            <select id="fType" required>
                <option value="" disabled selected>Select Fuel</option>
                <option value="398">Petrol 92 (Rs.398)</option>
                <option value="455">Petrol 95 (Rs.455)</option>
                <option value="382">Auto Diesel (Rs.382)</option>
                <option value="443">Super Diesel (Rs.443)</option>
            </select>

            <label>QR CODE IMAGE</label>
            <input type="file" id="vQR" accept="image/*" required style="padding: 10px;">

            <button type="submit" class="btn-log" style="margin-top:25px;">Save Vehicle</button>
            <button type="button" onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:var(--text-muted); font-weight:700; cursor:pointer;">Cancel</button>
        </form>
    </div>
</div>

<div class="modal" id="logModal">
    <div class="modal-content liquid-glass">
        <h3 style="text-align: center; margin-bottom: 5px;">Log Fuel Expense</h3>
        <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">Price per Liter: Rs.<span id="logUnitPrice">0</span></p>
        
        <div class="calc-grid">
            <div>
                <label style="margin-top:0; text-align:center;">Liters (L)</label>
                <input type="number" id="inputLiters" step="0.01" placeholder="0">
            </div>
            <div>
                <label style="margin-top:0; text-align:center;">Amount (Rs)</label>
                <input type="number" id="inputAmount" step="0.01" placeholder="0">
            </div>
        </div>

        <button class="btn-log" onclick="saveLog()">Add to Expenses</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:var(--text-muted); font-weight:700; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="modal" id="qrModal">
    <div class="modal-content liquid-glass" style="text-align: center;">
        <h3 id="qrTitle">Vehicle QR</h3>
        <img id="qrImageFull" src="" class="qr-full-img">
        <button onclick="closeModals()" class="btn-log">Close</button>
    </div>
</div>

<script>
    let vehicles = JSON.parse(localStorage.getItem('fuelPass_v4_vehicles')) || [];
    let totalLiters = parseFloat(localStorage.getItem('fuelPass_v4_liters')) || 0;
    let totalCost = parseFloat(localStorage.getItem('fuelPass_v4_cost')) || 0;
    let lastResetDate = localStorage.getItem('fuelPass_v4_lastReset') || "";
    
    // Variables for Calculator
    let currentLogPrice = 0;

    function init() {
        applyTheme();
        checkWeeklyReset();
        updateStatus();
        render();
        setupCalculator();
    }

    function applyTheme() {
        const theme = localStorage.getItem('fuelTheme_v4') || 'light';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('fuelTheme_v4', theme);
        applyTheme();
    }

    function checkWeeklyReset() {
        const now = new Date();
        const today = now.toLocaleDateString();
        if (now.getDay() === 6 && lastResetDate !== today) {
            totalLiters = 0; totalCost = 0; lastResetDate = today;
            saveData();
        }
    }

    function updateStatus() {
        const today = new Date();
        document.getElementById('dateDisplay').innerText = today.toLocaleDateString('si-LK', { weekday:'long', month:'long', day:'numeric' });
        
        const isEven = (today.getDate() % 2 === 0);
        document.getElementById('todayTypeDisplay').innerText = isEven ? "ඉරට්ටේ (EVEN)" : "ඔත්තේ (ODD)";
        document.getElementById('todayTypeDisplay').style.color = isEven ? "var(--success)" : "var(--primary-light)";
        document.getElementById('todayDigitInfo').innerText = isEven ? "අවසාන අංකය 0, 2, 4, 6, 8 සඳහා පමණයි" : "අවසාන අංකය 1, 3, 5, 7, 9 සඳහා පමණයි";
        
        document.getElementById('totalLitersDisplay').innerText = totalLiters.toFixed(1) + " L";
        document.getElementById('totalCostDisplay').innerText = "Rs. " + totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // Calculator Logic
    function setupCalculator() {
        const inputL = document.getElementById('inputLiters');
        const inputRs = document.getElementById('inputAmount');

        inputL.addEventListener('input', function() {
            if(this.value && currentLogPrice > 0) {
                inputRs.value = (parseFloat(this.value) * currentLogPrice).toFixed(2);
            } else { inputRs.value = ''; }
        });

        inputRs.addEventListener('input', function() {
            if(this.value && currentLogPrice > 0) {
                inputL.value = (parseFloat(this.value) / currentLogPrice).toFixed(2);
            } else { inputL.value = ''; }
        });
    }

    function openLogModal(price) {
        currentLogPrice = price;
        document.getElementById('logUnitPrice').innerText = price;
        document.getElementById('inputLiters').value = '';
        document.getElementById('inputAmount').value = '';
        document.getElementById('logModal').classList.add('active');
    }

    function saveLog() {
        const l = parseFloat(document.getElementById('inputLiters').value);
        const rs = parseFloat(document.getElementById('inputAmount').value);
        if(l > 0 && rs > 0) {
            totalLiters += l;
            totalCost += rs;
            saveData();
            updateStatus();
            closeModals();
        } else {
            alert("කරුණාකර අගයක් ඇතුලත් කරන්න.");
        }
    }

    // Core Logic
    document.getElementById('vehicleForm').onsubmit = function(e) {
        e.preventDefault();
        const reader = new FileReader();
        const file = document.getElementById('vQR').files[0];
        
        reader.onload = function(event) {
            const num = document.getElementById('vNumber').value;
            const match = num.match(/\d/g);
            const newV = {
                id: Date.now(),
                name: document.getElementById('vName').value,
                number: num,
                quota: parseInt(document.getElementById('vType').value),
                price: parseInt(document.getElementById('fType').value),
                typeName: document.getElementById('vType').options[document.getElementById('vType').selectedIndex].text.split('(')[0],
                fuelName: document.getElementById('fType').options[document.getElementById('fType').selectedIndex].text.split('(')[0],
                lastDigit: match ? parseInt(match[match.length - 1]) : 0,
                qr: event.target.result
            };
            vehicles.push(newV);
            saveData();
            closeModals();
            render();
            document.getElementById('vehicleForm').reset();
        };
        reader.readAsDataURL(file);
    };

    function render() {
        const list = document.getElementById('vehicleList');
        list.innerHTML = vehicles.length ? '' : '<div style="text-align:center; padding:40px; color:var(--text-muted); font-weight:600;">වාහන කිසිවක් ඇතුලත් කර නැත.</div>';
        
        const isEvenDay = (new Date().getDate() % 2 === 0);

        vehicles.forEach(v => {
            const isAllowed = (v.lastDigit % 2 === 0) === isEvenDay;
            const card = document.createElement('div');
            card.className = 'vehicle-card liquid-glass';
            card.innerHTML = `
                <div class="v-header">
                    <div class="v-title">
                        <h3>${v.name}</h3>
                        <p>${v.number}</p>
                    </div>
                    <img src="${v.qr}" class="v-qr-thumb" onclick="viewQR('${v.name}', '${v.qr}')" title="Click to View QR">
                </div>
                <div class="v-badge ${isAllowed ? 'badge-allow' : 'badge-deny'}">
                    <i class="fas ${isAllowed ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                    ${isAllowed ? 'අද දින ඉන්ධන ලබාගත හැක' : 'අද දින ලබාගත නොහැක'}
                </div>
                <div class="v-details">
                    <div class="detail-item"><span>TYPE / QUOTA</span><b>${v.typeName} (${v.quota}L)</b></div>
                    <div class="detail-item"><span>FUEL PRICE</span><b>${v.fuelName}</b></div>
                </div>
                <button class="btn-log" ${!isAllowed ? 'disabled' : ''} onclick="openLogModal(${v.price})">
                    <i class="fas fa-gas-pump"></i> ලීටර් හෝ මුදල ඇතුලත් කරන්න
                </button>
                <div style="text-align:right; margin-top:12px;">
                    <i class="fas fa-trash-alt" style="color:var(--danger); cursor:pointer; font-size:0.85rem;" onclick="deleteV(${v.id})"> Remove Vehicle</i>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function viewQR(name, qrSrc) {
        document.getElementById('qrTitle').innerText = name;
        document.getElementById('qrImageFull').src = qrSrc;
        document.getElementById('qrModal').classList.add('active');
    }

    function saveData() {
        localStorage.setItem('fuelPass_v4_vehicles', JSON.stringify(vehicles));
        localStorage.setItem('fuelPass_v4_liters', totalLiters);
        localStorage.setItem('fuelPass_v4_cost', totalCost);
        localStorage.setItem('fuelPass_v4_lastReset', lastResetDate);
    }

    function deleteV(id) { if(confirm("මෙම වාහනය ඉවත් කරන්නද?")) { vehicles = vehicles.filter(v => v.id !== id); saveData(); render(); } }
    function resetExpenses() { if(confirm("සියලුම වියදම් ඉතිහාසය මකා දමන්නද?")) { totalLiters = 0; totalCost = 0; saveData(); updateStatus(); } }
    
    function openAddModal() { document.getElementById('addModal').classList.add('active'); }
    function closeModals() { 
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); 
    }

    init();
</script>

</body>
</html>
