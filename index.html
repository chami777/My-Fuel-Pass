<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Fuel Pass - Premium</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius-lg: 28px;
            --radius-md: 20px;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-light: #312e81;
            --secondary: #38bdf8;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --border-color: #334155;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.3);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease; }
        
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden; }

        .app-container { width: 100%; max-width: 500px; padding: 24px 20px; padding-bottom: 120px; position: relative; }

        /* Header & Version */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; position: relative; z-index: 10; }
        .header-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
        .version-badge { font-size: 0.75rem; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 4px 10px; border-radius: 12px; display: inline-block; margin-top: 6px; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; box-shadow: var(--shadow-sm); }

        /* Status Widget */
        .status-widget { background: linear-gradient(135deg, var(--card-bg), var(--bg-color)); border-radius: var(--radius-lg); padding: 28px; text-align: center; margin-bottom: 24px; border: 1px solid var(--border-color); box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
        .status-widget::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--primary), var(--secondary)); }
        .date-text { font-size: 0.9rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .type-display { font-size: 3.2rem; font-weight: 900; line-height: 1; margin-bottom: 10px; letter-spacing: -1px; }
        .info-text { font-size: 0.95rem; font-weight: 600; color: #475569; background: rgba(0,0,0,0.04); display: inline-block; padding: 6px 16px; border-radius: 20px; }
        [data-theme="dark"] .date-text { color: #94a3b8; }
        [data-theme="dark"] .info-text { color: #cbd5e1; background: rgba(255,255,255,0.05); }

        /* Summary Stats */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 36px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; align-items: flex-start; position: relative; overflow: hidden; }
        .stat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-bottom: 12px; }
        .icon-blue { background: rgba(79, 70, 229, 0.1); color: var(--primary); }
        .icon-green { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .stat-label { font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        [data-theme="dark"] .stat-label { color: #94a3b8; }
        .stat-value { font-size: 1.6rem; font-weight: 800; }

        /* Section Header */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 1.3rem; font-weight: 800; }
        .reset-btn { background: rgba(239, 68, 68, 0.1); border: none; color: var(--danger); font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 16px; border-radius: 20px; transition: all 0.2s; }
        .reset-btn:active { transform: scale(0.95); }

        /* Vehicle Cards */
        .vehicle-card { background: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border-color); margin-bottom: 24px; box-shadow: var(--shadow-md); overflow: hidden; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .vc-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.01); }
        [data-theme="dark"] .vc-header { background: rgba(255,255,255,0.02); }
        .vc-info h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
        .vc-plate { display: inline-block; background: #fbbf24; color: #000; padding: 4px 12px; border-radius: 8px; font-weight: 800; font-family: monospace; font-size: 1rem; border: 2px solid #000; box-shadow: 2px 2px 0 #000; letter-spacing: 1px; }
        .vc-qr { width: 68px; height: 68px; border-radius: 14px; border: 2px solid var(--border-color); object-fit: cover; cursor: pointer; box-shadow: var(--shadow-sm); padding: 2px; background: #fff; }
        
        .vc-body { padding: 24px; }
        
        /* Progress Bar (NEW) */
        .quota-section { margin-bottom: 20px; }
        .quota-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; font-weight: 700; }
        .quota-label { color: #64748b; text-transform: uppercase; }
        [data-theme="dark"] .quota-label { color: #94a3b8; }
        .quota-text { color: var(--primary); font-size: 0.95rem; }
        
        .progress-bg { width: 100%; height: 12px; background: var(--border-color); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        /* Green if > 50%, Warning if > 20%, Danger if <= 20% */
        .fill-good { background: linear-gradient(90deg, #10b981, #34d399); }
        .fill-warn { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .fill-danger { background: linear-gradient(90deg, #ef4444, #f87171); }

        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; margin-bottom: 20px; width: 100%; justify-content: center; }
        .status-allowed { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-denied { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

        /* Individual Vehicle Stats */
        .vehicle-stats { background: var(--bg-color); border-radius: 16px; padding: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; border: 1px solid var(--border-color); }
        .v-stat { text-align: center; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .v-stat:first-child { border-right: 1px solid var(--border-color); }
        .v-stat-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        [data-theme="dark"] .v-stat-label { color: #94a3b8; }
        .v-stat-val { font-size: 1.2rem; font-weight: 800; color: var(--text-color); }

        .vc-actions { display: flex; gap: 12px; }
        .btn-primary { flex: 1; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: var(--border-color); color: #94a3b8; box-shadow: none; cursor: not-allowed; }
        .btn-icon { width: 52px; height: 52px; border-radius: 14px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--danger); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; transition: background 0.2s; }
        .btn-icon:hover { background: rgba(239, 68, 68, 0.1); }

        /* FAB */
        .fab-container { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 50; }
        .fab { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; height: 64px; padding: 0 32px; border-radius: 32px; font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5); pointer-events: auto; }

        /* Modals */
        .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 100; align-items: flex-end; justify-content: center; }
        .modal-backdrop.active { display: flex; animation: fadeInBg 0.3s; }
        @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 28px 28px 0 0; padding: 32px 24px; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h2 { font-size: 1.5rem; font-weight: 800; }
        .btn-close { background: var(--bg-color); border: none; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-color); cursor: pointer; font-size: 1.1rem; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #475569; }
        [data-theme="dark"] .form-label { color: #cbd5e1; }
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 1rem; font-weight: 600; }
        .form-input:focus { outline: none; border-color: var(--primary); background: transparent; }
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 14px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }

        .calc-header { text-align: center; margin-bottom: 24px; background: var(--bg-color); padding: 16px; border-radius: 16px; }
        .calc-price { font-size: 2.2rem; font-weight: 900; color: var(--primary); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .calc-input-wrapper { position: relative; }
        .calc-input-wrapper span { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-weight: 700; }
        .calc-input { width: 100%; padding: 16px 16px 16px 44px; border-radius: 14px; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 1.3rem; font-weight: 800; }
        .calc-input:focus { outline: none; border-color: var(--primary); background: transparent; }

        .qr-display { width: 100%; aspect-ratio: 1; border-radius: 20px; object-fit: contain; background: #fff; padding: 20px; border: 2px solid var(--border-color); }
        .empty-state { text-align: center; padding: 40px 20px; color: #64748b; }
        .empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.4; color: var(--primary); }
        [data-theme="dark"] .empty-state { color: #94a3b8; }

        .msg-box { background: rgba(0,0,0,0.03); padding: 20px; border-radius: 16px; text-align: left; margin-bottom: 24px; font-size: 0.95rem; line-height: 1.6; border: 1px solid var(--border-color); font-weight: 500; }
        [data-theme="dark"] .msg-box { background: rgba(255,255,255,0.03); }

        /* Developer Footer */
        .dev-footer { text-align: center; padding: 20px; margin-top: 20px; font-size: 0.8rem; font-weight: 600; color: #64748b; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 4px; }
        .dev-footer span { color: var(--primary); font-weight: 800; }
        [data-theme="dark"] .dev-footer { color: #94a3b8; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div>
            <h1 class="header-title">My Fuel Pass</h1>
            <div class="version-badge">v<span id="versionDisplay"></span></div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <div class="status-widget">
        <p class="date-text" id="dateDisplay"></p>
        <h2 class="type-display" id="todayTypeDisplay">--</h2>
        <p class="info-text" id="todayDigitInfo"></p>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon icon-blue"><i class="fas fa-gas-pump"></i></div>
            <span class="stat-label">මුළු ලීටර් ගණන</span>
            <span class="stat-value" id="totalLitersDisplay">0 L</span>
        </div>
        <div class="stat-card">
            <div class="stat-icon icon-green"><i class="fas fa-wallet"></i></div>
            <span class="stat-label">මුළු වියදම</span>
            <span class="stat-value" id="totalCostDisplay">Rs. 0</span>
        </div>
    </div>

    <div class="section-header">
        <h2>මගේ වාහන</h2>
        <button class="reset-btn" onclick="resetExpenses()">
            <i class="fas fa-rotate-right"></i> සියල්ල මකන්න
        </button>
    </div>

    <div id="vehicleList">
        </div>

    <div class="dev-footer">
        <p>Developed by <span>Chamalka</span></p>
        <p><i class="fas fa-phone-alt"></i> 076 856 7788</p>
    </div>

    <div class="fab-container">
        <button class="fab" onclick="openModal('addModal')">
            <i class="fas fa-plus"></i> වාහනයක් එක් කරන්න
        </button>
    </div>
</div>

<div class="modal-backdrop" id="addModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>නව වාහනයක්</h2>
            <button class="btn-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
        </div>
        <form id="vehicleForm">
            <div class="form-group">
                <label class="form-label">වාහනයේ නම</label>
                <input type="text" id="vName" class="form-input" placeholder="උදා: මගේ බයික් එක" required>
            </div>
            <div class="form-group">
                <label class="form-label">වාහන අංකය</label>
                <input type="text" id="vNumber" class="form-input" placeholder="WP ABC-1234" required>
            </div>
            <div class="form-group">
                <label class="form-label">වාහන වර්ගය (කෝටාව)</label>
                <select id="vType" class="form-input" required>
                    <option value="" disabled selected>වර්ගය තෝරන්න</option>
                    <option value="25">මෝටර් රථ (25L)</option>
                    <option value="20">ත්‍රීරෝද රථ (20L)</option>
                    <option value="8">යතුරුපැදි (8L)</option>
                    <option value="50">වෑන් රථ (50L)</option>
                    <option value="100">බස් රථ (100L)</option>
                    <option value="200">ලොරි රථ (200L)</option>
                    <option value="40">විශේෂ වාහන (40L)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">ඉන්ධන වර්ගය</label>
                <select id="fType" class="form-input" required>
                    <option value="" disabled selected>ඉන්ධන තෝරන්න</option>
                    <option value="398">පෙට්‍රල් 92 (Rs.398)</option>
                    <option value="455">පෙට්‍රල් 95 (Rs.455)</option>
                    <option value="382">ඔටෝ ඩීසල් (Rs.382)</option>
                    <option value="443">සුපර් ඩීසල් (Rs.443)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">QR කේතය (Image)</label>
                <input type="file" id="vQR" accept="image/*" class="form-input" style="padding: 12px; background: transparent;" required>
            </div>
            <button type="submit" class="btn-submit">වාහනය Save කරන්න</button>
        </form>
    </div>
</div>

<div class="modal-backdrop" id="logModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>වියදම් සටහන් කරන්න</h2>
            <button class="btn-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
        </div>
        <div class="calc-header">
            <div class="form-label" style="margin-bottom: 4px;">ලීටරයක මිල</div>
            <div class="calc-price" id="logUnitPrice">0</div>
        </div>
        <div class="calc-grid">
            <div class="calc-input-wrapper">
                <span>L</span>
                <input type="number" id="inputLiters" class="calc-input" step="0.01" placeholder="0.00">
            </div>
            <div class="calc-input-wrapper">
                <span>Rs</span>
                <input type="number" id="inputAmount" class="calc-input" step="0.01" placeholder="0.00">
            </div>
        </div>
        <button class="btn-submit" onclick="saveLog()">ඇතුලත් කරන්න</button>
    </div>
</div>

<div class="modal-backdrop" id="qrModal">
    <div class="modal-content" style="padding-bottom: 40px;">
        <div class="modal-header">
            <h2 id="qrTitle">QR කේතය</h2>
            <button class="btn-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
        </div>
        <img id="qrImageFull" src="" class="qr-display">
    </div>
</div>

<div class="modal-backdrop" id="updateModal">
    <div class="modal-content" style="text-align: center;">
        <div style="margin-bottom: 16px;">
            <i class="fas fa-gift" style="font-size: 4rem; color: var(--primary);"></i>
        </div>
        <h2 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 8px;">යෙදුම යාවත්කාලීන විය!</h2>
        <p style="color: #64748b; font-size: 0.95rem; margin-bottom: 24px;">අලුත් සංස්කරණය වෙත සාදරයෙන් පිළිගනිමු.</p>
        
        <div class="msg-box" id="updateMessageContent"></div>

        <button onclick="closeUpdateModal()" class="btn-submit">හරි, මට තේරුණා!</button>
    </div>
</div>

<div class="modal-backdrop" id="announcementModal">
    <div class="modal-content" style="text-align: center;">
        <div style="margin-bottom: 16px;">
            <i class="fas fa-bullhorn" style="font-size: 4rem; color: var(--warning);"></i>
        </div>
        <h2 id="announceTitle" style="font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; color: var(--warning);">විශේෂ නිවේදනයයි!</h2>
        
        <div class="msg-box" id="announceBody" style="font-size: 1rem; text-align: left;"></div>

        <button onclick="closeAnnouncement()" class="btn-submit" style="background: var(--warning); color: #000;">හරි, මට තේරුණා!</button>
    </div>
</div>

<script>
    // ==========================================
    // 1. UPDATE SYSTEM CONFIGURATION
    // ==========================================
    const APP_VERSION = "2.2"; 
    const UPDATE_MESSAGE = `
        <strong>අලුත් සංස්කරණය (v2.2)</strong><br><br>
        ✅ <strong>Quota Progress Bar</strong> එකක් හඳුන්වාදීම. (ඉතිරි ඉන්ධන ප්‍රමාණය පහසුවෙන් බලාගන්න).<br>
        ✅ වඩාත් ආකර්ෂණීය Premium UI එකක් නිර්මාණය කිරීම.<br>
        ✅ Developer විස්තර ඇතුළත් කිරීම.
    `;

    // ==========================================
    // 2. CUSTOM ANNOUNCEMENT SYSTEM
    // ==========================================
    const ANNOUNCEMENT_ID = "msg_1"; 
    const ANNOUNCE_TITLE = "ආයුබෝවන්!"; 
    const ANNOUNCE_BODY = `
        මෙම පද්ධතිය දැන් සිංහල භාෂාවෙන් භාවිතා කළ හැක. අලුතින් එක් කළ Quota Progress Bar එක හරහා ඔබට ඉතිරි වී ඇති ඉන්ධන ප්‍රමාණය පහසුවෙන් දැකගත හැක.
    `;
    // ==========================================

    let vehicles = JSON.parse(localStorage.getItem('fuelPass_v5_vehicles')) || [];
    let lastResetDate = localStorage.getItem('fuelPass_v5_lastReset') || "";
    let currentLogVehicleId = null;
    let currentLogPrice = 0;
    let currentLogQuota = 0;
    let currentLogSpentLiters = 0;

    function init() {
        document.getElementById('versionDisplay').innerText = APP_VERSION;
        
        applyTheme();
        checkUpdates();
        checkAnnouncements(); 
        checkWeeklyReset();
        updateUI();
        setupCalculator();
    }

    function checkUpdates() {
        const savedVersion = localStorage.getItem('fuelPassCurrentVersion_Premium');
        if (savedVersion !== APP_VERSION) {
            document.getElementById('updateMessageContent').innerHTML = UPDATE_MESSAGE;
            setTimeout(() => { openModal('updateModal'); }, 600);
        }
    }

    function closeUpdateModal() {
        localStorage.setItem('fuelPassCurrentVersion_Premium', APP_VERSION);
        closeModals();
    }

    function checkAnnouncements() {
        const seenMsg = localStorage.getItem('fuelPass_seenMessage');
        const savedVersion = localStorage.getItem('fuelPassCurrentVersion_Premium');
        
        if (savedVersion === APP_VERSION && ANNOUNCEMENT_ID !== "" && seenMsg !== ANNOUNCEMENT_ID) {
            document.getElementById('announceTitle').innerText = ANNOUNCE_TITLE;
            document.getElementById('announceBody').innerHTML = ANNOUNCE_BODY;
            setTimeout(() => { openModal('announcementModal'); }, 600); 
        }
    }

    function closeAnnouncement() {
        localStorage.setItem('fuelPass_seenMessage', ANNOUNCEMENT_ID);
        closeModals();
    }

    function applyTheme() {
        const theme = localStorage.getItem('fuelTheme_v5') || 'light';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('fuelTheme_v5', theme);
        applyTheme();
    }

    function checkWeeklyReset() {
        const now = new Date();
        const today = now.toLocaleDateString();
        // Sunday is 0, Monday is 1... Saturday is 6
        if (now.getDay() === 6 && lastResetDate !== today) {
            vehicles.forEach(v => { v.spentLiters = 0; v.spentCost = 0; });
            lastResetDate = today;
            saveData();
        }
    }

    function updateUI() {
        const today = new Date();
        document.getElementById('dateDisplay').innerText = today.toLocaleDateString('si-LK', { weekday:'long', month:'long', day:'numeric' });
        
        const isEven = (today.getDate() % 2 === 0);
        const typeDisplay = document.getElementById('todayTypeDisplay');
        typeDisplay.innerText = isEven ? "ඉරට්ටේ" : "ඔත්තේ";
        typeDisplay.style.color = isEven ? "var(--secondary)" : "var(--primary)";
        document.getElementById('todayDigitInfo').innerText = isEven ? "අවසර ඇත: 0, 2, 4, 6, 8" : "අවසර ඇත: 1, 3, 5, 7, 9";
        
        renderVehicles();
        updateGlobalStats();
    }

    function updateGlobalStats() {
        let tLiters = 0, tCost = 0;
        vehicles.forEach(v => {
            tLiters += (v.spentLiters || 0);
            tCost += (v.spentCost || 0);
        });
        document.getElementById('totalLitersDisplay').innerText = tLiters.toFixed(1) + " L";
        document.getElementById('totalCostDisplay').innerText = "Rs. " + tCost.toLocaleString(undefined, {minimumFractionDigits: 0});
    }

    function setupCalculator() {
        const inputL = document.getElementById('inputLiters');
        const inputRs = document.getElementById('inputAmount');

        inputL.addEventListener('input', function() {
            if(this.value && currentLogPrice > 0) {
                let enteredLiters = parseFloat(this.value);
                // Prevent entering more than remaining quota
                let remaining = currentLogQuota - currentLogSpentLiters;
                if(enteredLiters > remaining) {
                    alert(`ඔබට ලබාගත හැක්කේ ලීටර් ${remaining.toFixed(1)} ක් පමණි!`);
                    this.value = remaining.toFixed(2);
                    enteredLiters = remaining;
                }
                inputRs.value = (enteredLiters * currentLogPrice).toFixed(2);
            } else inputRs.value = '';
        });

        inputRs.addEventListener('input', function() {
            if(this.value && currentLogPrice > 0) {
                let calcLiters = parseFloat(this.value) / currentLogPrice;
                let remaining = currentLogQuota - currentLogSpentLiters;
                if(calcLiters > remaining) {
                    alert(`ඔබට ලබාගත හැක්කේ ලීටර් ${remaining.toFixed(1)} ක් (රු.${(remaining*currentLogPrice).toFixed(2)}) පමණි!`);
                    calcLiters = remaining;
                    this.value = (calcLiters * currentLogPrice).toFixed(2);
                }
                inputL.value = calcLiters.toFixed(2);
            } else inputL.value = '';
        });
    }

    function openLogModal(id, price, quota, spent) {
        currentLogVehicleId = id;
        currentLogPrice = price;
        currentLogQuota = quota;
        currentLogSpentLiters = spent;
        
        let remaining = quota - spent;
        if(remaining <= 0) {
            alert("මෙම වාහනයේ කෝටාව අවසන් වී ඇත!");
            return;
        }

        document.getElementById('logUnitPrice').innerText = "Rs. " + price;
        document.getElementById('inputLiters').value = '';
        document.getElementById('inputAmount').value = '';
        openModal('logModal');
    }

    function saveLog() {
        const l = parseFloat(document.getElementById('inputLiters').value);
        const rs = parseFloat(document.getElementById('inputAmount').value);
        if(l > 0 && rs > 0) {
            const vIndex = vehicles.findIndex(v => v.id === currentLogVehicleId);
            if(vIndex > -1) {
                vehicles[vIndex].spentLiters = (vehicles[vIndex].spentLiters || 0) + l;
                vehicles[vIndex].spentCost = (vehicles[vIndex].spentCost || 0) + rs;
                saveData();
                updateUI();
                closeModals();
            }
        }
    }

    document.getElementById('vehicleForm').onsubmit = function(e) {
        e.preventDefault();
        const reader = new FileReader();
        const file = document.getElementById('vQR').files[0];
        
        reader.onload = function(event) {
            const num = document.getElementById('vNumber').value;
            const match = num.match(/\d/g);
            
            let fullTypeName = document.getElementById('vType').options[document.getElementById('vType').selectedIndex].text;
            let typeName = fullTypeName.split('(')[0].trim();
            
            let fullFuelName = document.getElementById('fType').options[document.getElementById('fType').selectedIndex].text;
            let fuelName = fullFuelName.split('(')[0].trim();

            const newV = {
                id: Date.now(),
                name: document.getElementById('vName').value,
                number: num,
                quota: parseInt(document.getElementById('vType').value),
                price: parseInt(document.getElementById('fType').value),
                typeName: typeName,
                fuelName: fuelName,
                lastDigit: match ? parseInt(match[match.length - 1]) : 0,
                qr: event.target.result,
                spentLiters: 0,
                spentCost: 0
            };
            vehicles.push(newV); saveData(); closeModals(); updateUI(); document.getElementById('vehicleForm').reset();
        };
        reader.readAsDataURL(file);
    };

    function renderVehicles() {
        const list = document.getElementById('vehicleList');
        if(!vehicles.length) {
            list.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-car empty-icon"></i>
                    <h3 style="font-weight:800; margin-bottom:8px; color:var(--text-color);">තවමත් වාහන නැත</h3>
                    <p>පහළ ඇති + බොත්තම ඔබා වාහනයක් ඇතුලත් කරන්න.</p>
                </div>`;
            return;
        }

        list.innerHTML = '';
        const isEvenDay = (new Date().getDate() % 2 === 0);

        vehicles.forEach(v => {
            const isAllowed = (v.lastDigit % 2 === 0) === isEvenDay;
            const spentL = v.spentLiters || 0;
            const spentC = v.spentCost || 0;
            const quota = v.quota || 0;
            
            // Progress Calculation
            let percent = (spentL / quota) * 100;
            if(percent > 100) percent = 100;
            let remainL = quota - spentL;
            if(remainL < 0) remainL = 0;
            
            let barColorClass = "fill-good";
            if (percent >= 80) barColorClass = "fill-danger";
            else if (percent >= 50) barColorClass = "fill-warn";

            const card = document.createElement('div');
            card.className = 'vehicle-card';
            card.innerHTML = `
                <div class="vc-header">
                    <div class="vc-info">
                        <h3>${v.name}</h3>
                        <div class="vc-plate">${v.number}</div>
                    </div>
                    <img src="${v.qr}" class="vc-qr" onclick="viewQR('${v.name}', '${v.qr}')">
                </div>
                <div class="vc-body">
                    <div class="status-badge ${isAllowed ? 'status-allowed' : 'status-denied'}">
                        <i class="fas ${isAllowed ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                        ${isAllowed ? 'අද දින ඉන්ධන ලබාගත හැක' : 'අද දින ලබාගත නොහැක'}
                    </div>
                    
                    <div class="quota-section">
                        <div class="quota-header">
                            <span class="quota-label">ඉතිරි කෝටාව</span>
                            <span class="quota-text"><b>${remainL.toFixed(1)}L</b> / ${quota}L</span>
                        </div>
                        <div class="progress-bg">
                            <div class="progress-fill ${barColorClass}" style="width: ${percent}%;"></div>
                        </div>
                    </div>

                    <div class="vehicle-stats">
                        <div class="v-stat">
                            <div class="v-stat-label">ලබාගත් (L)</div>
                            <div class="v-stat-val">${spentL.toFixed(1)}</div>
                        </div>
                        <div class="v-stat">
                            <div class="v-stat-label">වියදම (Rs)</div>
                            <div class="v-stat-val">${spentC.toLocaleString()}</div>
                        </div>
                    </div>

                    <div class="vc-actions">
                        <button class="btn-primary" ${!isAllowed || remainL <= 0 ? 'disabled' : ''} onclick="openLogModal(${v.id}, ${v.price}, ${v.quota}, ${v.spentLiters})">
                            <i class="fas fa-pen-to-square"></i> සටහන් කරන්න
                        </button>
                        <button class="btn-icon" onclick="deleteV(${v.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function viewQR(name, qrSrc) {
        document.getElementById('qrTitle').innerText = name;
        document.getElementById('qrImageFull').src = qrSrc;
        openModal('qrModal');
    }

    function saveData() {
        localStorage.setItem('fuelPass_v5_vehicles', JSON.stringify(vehicles));
        localStorage.setItem('fuelPass_v5_lastReset', lastResetDate);
    }

    function deleteV(id) { if(confirm("මෙම වාහනය ඉවත් කිරීමට අවශ්‍යද?")) { vehicles = vehicles.filter(v => v.id !== id); saveData(); updateUI(); } }
    
    function resetExpenses() { 
        if(confirm("සියලුම වාහන වල ඉතිහාසය මකා දැමීමට අවශ්‍යද?")) { 
            vehicles.forEach(v => { v.spentLiters = 0; v.spentCost = 0; });
            saveData(); updateUI(); 
        } 
    }
    
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModals() { document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('active')); }

    window.onclick = function(event) {
        if (event.target.classList.contains('modal-backdrop')) {
            closeModals();
        }
    }

    init();
</script>
<script>
    // Offline වැඩ කිරීම සඳහා Service Worker සම්බන්ධ කිරීම
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Offline mode activated!'))
                .catch(err => console.log('Offline mode error: ', err));
        });
    }
</script>
</body>
</html>
